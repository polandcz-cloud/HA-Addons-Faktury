<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakturaApp</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f1f5f9;--sf:#fff;--sf2:#f8fafc;--bd:#e2e8f0;--tx:#1e293b;--tx2:#475569;--tx3:#94a3b8;--pr:#0f172a;--ac:#3b82f6;--ac2:#2563eb;--gn:#10b981;--rd:#ef4444;--am:#f59e0b;--pp:#8b5cf6;--tl:#0d9488;--r:10px;--sh:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--tx)}
input,select,textarea,button{font-family:inherit}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:13.5px;outline:none;transition:border .2s;background:#fff;color:var(--tx)}
input:focus,select:focus,textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
select{cursor:pointer}textarea{resize:vertical;min-height:64px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-pr{background:var(--pr);color:#fff}.btn-ac{background:var(--ac);color:#fff}.btn-gh{background:0;color:var(--tx2);border:1.5px solid var(--bd)}
.btn-pp{background:var(--pp);color:#fff}.btn-tl{background:var(--tl);color:#fff}.btn-dn{background:#fef2f2;color:var(--rd);border:1px solid #fecaca}
.btn-sm{padding:6px 12px;font-size:12px}
.lb{display:block;font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.card{background:var(--sf);border-radius:var(--r);padding:24px;box-shadow:var(--sh);border:1px solid var(--bd)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.ib{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border:1.5px solid var(--bd);border-radius:7px;background:var(--sf);cursor:pointer;color:var(--tx2);transition:all .15s;font-size:13px}
.ib:hover{background:var(--sf2)}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;background:var(--sf2);border-bottom:1.5px solid var(--bd)}
td{padding:11px 14px;border-bottom:1px solid var(--bd);font-size:13px}
.st{font-size:15px;font-weight:700;color:var(--pr);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.st::before{content:'';width:3px;height:18px;border-radius:2px}
.st-ac::before{background:var(--ac)}.st-pp::before{background:var(--pp)}.st-tl::before{background:var(--tl)}.st-am::before{background:var(--am)}.st-gn::before{background:var(--gn)}
.side{width:220px;background:var(--pr);color:#fff;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
.side nav button{display:flex;align-items:center;gap:10px;width:100%;padding:11px 20px;background:0;border:0;color:#94a3b8;font-size:13.5px;cursor:pointer;border-left:3px solid transparent;font-family:inherit;transition:all .15s}
.side nav button:hover{color:#e2e8f0;background:rgba(255,255,255,.04)}
.side nav button.on{color:#fff;background:rgba(59,130,246,.12);border-left-color:var(--ac);font-weight:600}
.main{margin-left:220px;padding:28px 36px;min-height:100vh}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--pr);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:fi .3s}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .3s ease-out}
@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.main{margin-left:0;padding:16px}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const e=React.createElement,{useState:uS,useEffect:uE,useRef:uR,useMemo:uM}=React;

// ═══ API ═══
const A={
  g:u=>fetch('/api'+u).then(r=>r.json()),
  p:(u,d)=>fetch('/api'+u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()),
  u:(u,d)=>fetch('/api'+u,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()),
  pa:(u,d)=>fetch('/api'+u,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()),
  d:u=>fetch('/api'+u,{method:'DELETE'}).then(r=>r.json()),
};

// ═══ HELPERS ═══
const fm=n=>new Intl.NumberFormat("cs-CZ",{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const fd=d=>{if(!d)return"";const p=d.split("-");return p[2]+"."+p[1]+"."+p[0];};
const td=()=>new Date().toISOString().slice(0,10);
const ad=(d,n)=>{const t=new Date(d);t.setDate(t.getDate()+n);return t.toISOString().slice(0,10);};
const ui=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const MN=["Led","Úno","Bře","Dub","Kvě","Čvn","Čvc","Srp","Zář","Říj","Lis","Pro"];
const PM=[{l:"Převodem",v:"bank"},{l:"Hotově",v:"cash"},{l:"Kartou",v:"card"}];
const VR=[{l:"21%",v:21},{l:"12%",v:12},{l:"0%",v:0}];
const UN=["ks","hod","m","m²","m³","kg","l","komplet","den"];

const IS={draft:{l:"Rozpracovaná",c:"#8b5cf6",b:"#f5f3ff"},new:{l:"Nová",c:"#3b82f6",b:"#eff6ff"},sent:{l:"Odeslaná",c:"#f59e0b",b:"#fffbeb"},paid:{l:"Uhrazená",c:"#10b981",b:"#ecfdf5"},overdue:{l:"Po splatnosti",c:"#ef4444",b:"#fef2f2"},cancelled:{l:"Storno",c:"#6b7280",b:"#f3f4f6"}};
const QS={draft:{l:"Rozpracovaná",c:"#8b5cf6",b:"#f5f3ff"},new:{l:"Nová",c:"#0d9488",b:"#f0fdfa"},sent:{l:"Odeslaná",c:"#f59e0b",b:"#fffbeb"},approved:{l:"Schválená",c:"#10b981",b:"#ecfdf5"},rejected:{l:"Odmítnutá",c:"#ef4444",b:"#fef2f2"},expired:{l:"Vypršená",c:"#6b7280",b:"#f3f4f6"},invoiced:{l:"Fakturováno",c:"#3b82f6",b:"#eff6ff"}};

function ci(it,vat){const b=it.qty*it.unit_price;const v=vat?b*(it.vat_rate/100):0;return{base:b,vat:v,total:b+v};}
function cI(inv,vat,disc){let tb=0,tv=0;const vs={};for(const it of(inv.items||[])){const c=ci(it,vat);tb+=c.base;tv+=c.vat;if(vat&&it.vat_rate>0){if(!vs[it.vat_rate])vs[it.vat_rate]={base:0,vat:0};vs[it.vat_rate].base+=c.base;vs[it.vat_rate].vat+=c.vat;}}
  const d=disc||0;const db=tb*(d/100);const dv=tv*(d/100);
  return{totalBase:tb-db,totalVat:tv-dv,total:(tb+tv)-(db+dv),discount:db+dv,vatSummary:vs};}

async function ares(ico){
  try{const r=await fetch('https://ares.gov.cz/ekonomicke-subjekty-v-registru-ekonomickych-subjektu/rest/ekonomicke-subjekty/'+ico);
  if(!r.ok)throw 0;const d=await r.json();const a=d.sidlo||{};
  return{name:d.obchodniJmeno||"",ico:d.ico||ico,dic:d.dic||"",street:[a.nazevUlice,a.cisloDomovni?(a.cisloDomovni+(a.cisloOrientacni?"/"+a.cisloOrientacni:"")):""].filter(Boolean).join(" "),city:a.nazevObce||"",zip:a.psc?String(a.psc):""};
  }catch{return null;}
}

// ═══ QR + PDF ═══
function spd(s,inv,amt){const p=["SPD*1.0"];if(s.iban)p.push("ACC:"+s.iban.replace(/\s/g,""));p.push("AM:"+amt.toFixed(2));p.push("CC:"+(s.currency||"CZK"));p.push("X-VS:"+inv.number.replace(/\D/g,""));return p.join("*");}
function qr(d){return"https://api.qrserver.com/v1/create-qr-code/?size=160x160&data="+encodeURIComponent(d);}

function pdfInv(inv,sup){
  const vat=sup.is_vat_payer;const c=cI(inv,vat);const bk=sup.bank_account?sup.bank_account+"/"+sup.bank_code:"";
  const q=qr(spd(sup,inv,c.total));const vs=inv.number.replace(/\D/g,"");const pm=(PM.find(m=>m.v===inv.payment_method)||{}).l||"";
  const logo=sup.logo_image?'<img src="'+sup.logo_image+'" style="max-height:50px;max-width:180px;object-fit:contain"/>':sup.logo_text?'<div style="font-size:22px;font-weight:800;letter-spacing:-1px">'+sup.logo_text+'</div>':'';
  return'<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Faktura '+inv.number+'</title><style>@import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap");*{margin:0;padding:0;box-sizing:border-box}body{font-family:Outfit,sans-serif;color:#1e293b;padding:40px 48px;font-size:13px;line-height:1.5;max-width:800px;margin:0 auto}.hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:20px;border-bottom:3px solid #0f172a}.hd-l{display:flex;align-items:center;gap:14}.hd h1{font-size:30px;font-weight:800;letter-spacing:-1px}.hd .sub{font-size:12px;color:#64748b;margin-top:3px}.pts{display:flex;gap:40px;margin-bottom:24px}.pt{flex:1}.pt h3{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#94a3b8;margin-bottom:6px;font-weight:600}.pt .nm{font-size:15px;font-weight:700;margin-bottom:4px}.pt p{margin-bottom:1px;color:#475569;font-size:12px}.mt{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;background:#f8fafc;padding:14px 18px;border-radius:8px;border:1px solid #e2e8f0}.mt .lb{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#94a3b8}.mt .vl{font-weight:600;font-size:12.5px;margin-top:2px}table{width:100%;border-collapse:collapse;margin-bottom:20px}thead th{background:#0f172a;color:#fff;padding:9px 12px;text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px}thead th:nth-child(n+3){text-align:right}tbody td{padding:9px 12px;border-bottom:1px solid #e2e8f0;font-size:12px}tbody td:nth-child(n+3){text-align:right}.sm{display:flex;justify-content:space-between;margin-bottom:20px}.sm .qr{text-align:center}.sm .qr img{width:130px;height:130px;border:1px solid #e2e8f0;border-radius:6px;padding:3px}.sm .qr p{font-size:9px;color:#94a3b8;margin-top:4px}.sm table{width:260px}.sm td{padding:5px 10px;border:none;font-size:12px}.sm .tot{font-size:18px;font-weight:800}.sm .tr td{border-top:3px solid #0f172a;padding-top:8px}.py{background:#f8fafc;padding:14px 18px;border-radius:8px;border:1px solid #e2e8f0;margin-bottom:12px}.py h4{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#94a3b8;margin-bottom:6px}.py p{font-size:12px;margin-bottom:2px;color:#475569}.py strong{color:#1e293b}.nt{color:#64748b;font-size:11px;font-style:italic;margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0}@media print{body{padding:20px}}</style></head><body><div class="hd"><div class="hd-l">'+logo+'<div><h1>FAKTURA</h1><div class="sub">č. '+inv.number+'</div></div></div><div style="text-align:right;font-size:11px;color:#64748b">'+(vat?"Daňový doklad":"Faktura")+'<br>VS: <strong>'+vs+'</strong></div></div><div class="pts"><div class="pt"><h3>Dodavatel</h3><div class="nm">'+sup.name+'</div><p>'+sup.street+'</p><p>'+sup.zip+' '+sup.city+'</p><p>IČO: '+sup.ico+(sup.dic?' · DIČ: '+sup.dic:'')+'</p>'+(sup.email?'<p>'+sup.email+'</p>':'')+'</div><div class="pt"><h3>Odběratel</h3><div class="nm">'+inv.customer.name+'</div><p>'+inv.customer.street+'</p><p>'+inv.customer.zip+' '+inv.customer.city+'</p><p>IČO: '+inv.customer.ico+(inv.customer.dic?' · DIČ: '+inv.customer.dic:'')+'</p></div></div><div class="mt"><div><div class="lb">Vystavení</div><div class="vl">'+fd(inv.issue_date)+'</div></div>'+(vat?'<div><div class="lb">DUZP</div><div class="vl">'+fd(inv.taxable_date)+'</div></div>':'<div></div>')+'<div><div class="lb">Splatnost</div><div class="vl">'+fd(inv.due_date)+'</div></div><div><div class="lb">Úhrada</div><div class="vl">'+pm+'</div></div></div><table><thead><tr><th style="width:40%">Popis</th><th>Mn.</th><th>Cena/ks</th>'+(vat?'<th>DPH</th>':'')+'<th>Celkem</th></tr></thead><tbody>'+inv.items.map(function(it){var x=ci(it,vat);return'<tr><td>'+it.description+'</td><td style="text-align:center">'+it.qty+' '+it.unit+'</td><td>'+fm(it.unit_price)+' Kč</td>'+(vat?'<td>'+it.vat_rate+'%</td>':'')+'<td style="font-weight:600">'+fm(x.total)+' Kč</td></tr>';}).join('')+'</tbody></table><div class="sm"><div class="qr"><img src="'+q+'" alt="QR"/><p>QR Platba</p></div><table><tr><td style="color:#64748b">Základ:</td><td style="text-align:right">'+fm(c.totalBase)+' Kč</td></tr>'+(vat?Object.keys(c.vatSummary).map(function(r){return'<tr><td style="color:#64748b">DPH '+r+'%:</td><td style="text-align:right">'+fm(c.vatSummary[r].vat)+' Kč</td></tr>';}).join(''):'')+'<tr class="tr"><td class="tot">Celkem:</td><td class="tot" style="text-align:right">'+fm(c.total)+' Kč</td></tr></table></div>'+(bk?'<div class="py"><h4>Platba</h4><p>Účet: <strong>'+bk+'</strong></p><p>VS: <strong>'+vs+'</strong></p>'+(sup.iban?'<p>IBAN: <strong>'+sup.iban+'</strong></p>':'')+'</div>':'')+(inv.note?'<div class="nt">'+inv.note+'</div>':'')+'<script>window.onload=function(){setTimeout(function(){window.print()},500)}<\/script></body></html>';
}

function pdfQuote(q,sup){
  const vat=sup.is_vat_payer;const c=cI(q,vat,q.discount_percent);
  const logo=sup.logo_image?'<img src="'+sup.logo_image+'" style="max-height:50px;max-width:180px;object-fit:contain"/>':sup.logo_text?'<div style="font-size:22px;font-weight:800;letter-spacing:-1px">'+sup.logo_text+'</div>':'';
  return'<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Nabídka '+q.number+'</title><style>@import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap");*{margin:0;padding:0;box-sizing:border-box}body{font-family:Outfit,sans-serif;color:#1e293b;padding:40px 48px;font-size:13px;line-height:1.5;max-width:800px;margin:0 auto}.hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:20px;border-bottom:3px solid #0d9488}.hd-l{display:flex;align-items:center;gap:14}.hd h1{font-size:30px;font-weight:800;letter-spacing:-1px;color:#0d9488}.hd .sub{font-size:12px;color:#64748b;margin-top:3px}.pts{display:flex;gap:40px;margin-bottom:24px}.pt{flex:1}.pt h3{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#94a3b8;margin-bottom:6px;font-weight:600}.pt .nm{font-size:15px;font-weight:700;margin-bottom:4px}.pt p{margin-bottom:1px;color:#475569;font-size:12px}.mt{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;background:#f0fdfa;padding:14px 18px;border-radius:8px;border:1px solid #99f6e4}.mt .lb{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#94a3b8}.mt .vl{font-weight:600;font-size:12.5px;margin-top:2px}.intro{margin-bottom:20px;padding:14px 18px;background:#f0fdfa;border-radius:8px;border:1px solid #99f6e4;font-size:13px;color:#475569}table{width:100%;border-collapse:collapse;margin-bottom:20px}thead th{background:#0d9488;color:#fff;padding:9px 12px;text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px}thead th:nth-child(n+3){text-align:right}tbody td{padding:9px 12px;border-bottom:1px solid #e2e8f0;font-size:12px}tbody td:nth-child(n+3){text-align:right}.sm{display:flex;justify-content:flex-end;margin-bottom:20px}.sm table{width:280px}.sm td{padding:5px 10px;border:none;font-size:12px}.sm .tot{font-size:18px;font-weight:800;color:#0d9488}.sm .tr td{border-top:3px solid #0d9488;padding-top:8px}.outro{margin-top:16px;padding:14px 18px;background:#f0fdfa;border-radius:8px;border:1px solid #99f6e4;font-size:13px;color:#475569}.ft{margin-top:32px;padding-top:16px;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8}@media print{body{padding:20px}}</style></head><body><div class="hd"><div class="hd-l">'+logo+'<div><h1>CENOVÁ NABÍDKA</h1><div class="sub">č. '+q.number+'</div></div></div><div style="text-align:right;font-size:11px;color:#64748b">Cenová nabídka</div></div><div class="pts"><div class="pt"><h3>Dodavatel</h3><div class="nm">'+sup.name+'</div><p>'+sup.street+'</p><p>'+sup.zip+' '+sup.city+'</p><p>IČO: '+sup.ico+(sup.dic?' · DIČ: '+sup.dic:'')+'</p>'+(sup.email?'<p>'+sup.email+'</p>':'')+'</div><div class="pt"><h3>Odběratel</h3><div class="nm">'+q.customer.name+'</div><p>'+q.customer.street+'</p><p>'+q.customer.zip+' '+q.customer.city+'</p><p>IČO: '+q.customer.ico+(q.customer.dic?' · DIČ: '+q.customer.dic:'')+'</p></div></div><div class="mt"><div><div class="lb">Datum vystavení</div><div class="vl">'+fd(q.issue_date)+'</div></div><div><div class="lb">Platnost do</div><div class="vl">'+fd(q.valid_until)+'</div></div><div></div></div>'+(q.intro_text?'<div class="intro">'+q.intro_text+'</div>':'')+'<table><thead><tr><th style="width:40%">Popis</th><th>Mn.</th><th>Cena/ks</th>'+(vat?'<th>DPH</th>':'')+'<th>Celkem</th></tr></thead><tbody>'+q.items.map(function(it){var x=ci(it,vat);return'<tr><td>'+it.description+'</td><td style="text-align:center">'+it.qty+' '+it.unit+'</td><td>'+fm(it.unit_price)+' Kč</td>'+(vat?'<td>'+it.vat_rate+'%</td>':'')+'<td style="font-weight:600">'+fm(x.total)+' Kč</td></tr>';}).join('')+'</tbody></table><div class="sm"><table><tr><td style="color:#64748b">Základ:</td><td style="text-align:right">'+fm(c.totalBase+(c.discount||0))+' Kč</td></tr>'+(q.discount_percent>0?'<tr><td style="color:#0d9488">Sleva '+q.discount_percent+'%:</td><td style="text-align:right;color:#0d9488">-'+fm(c.discount)+' Kč</td></tr>':'')+'<tr class="tr"><td class="tot">Celkem:</td><td class="tot" style="text-align:right">'+fm(c.total)+' Kč</td></tr></table></div>'+(q.outro_text?'<div class="outro">'+q.outro_text+'</div>':'')+'<div class="ft">Tato nabídka je platná do '+fd(q.valid_until)+'. '+sup.name+' · '+sup.email+'</div><script>window.onload=function(){setTimeout(function(){window.print()},500)}<\/script></body></html>';
}

// ═══ MAIN APP ═══
function App(){
  const[pg,setPg]=uS("dashboard");
  const[invs,setInvs]=uS([]);const[custs,setCusts]=uS([]);const[recs,setRecs]=uS([]);const[quotes,setQuotes]=uS([]);
  const[sup,setSup]=uS(null);const[ed,setEd]=uS(null);const[edQ,setEdQ]=uS(null);
  const[ld,setLd]=uS(true);const[toast,setToast]=uS(null);

  const tt=m=>{setToast(m);setTimeout(()=>setToast(null),2500);};
  const reload=async()=>{const[s,i,c,r,q]=await Promise.all([A.g('/supplier'),A.g('/invoices'),A.g('/customers'),A.g('/recurrings'),A.g('/quotes')]);setSup(s);setInvs(i);setCusts(c);setRecs(r);setQuotes(q);setLd(false);};
  uE(()=>{reload();},[]);

  const vat=sup?.is_vat_payer;
  const drafts=invs.filter(i=>i.status==='draft');
  const activeInvs=invs.filter(i=>i.status!=='draft');

  // Invoice actions
  const saveInv=async inv=>{await A.p('/invoices',inv);await reload();setEd(null);setPg("invoices");tt("✓ Uloženo");};
